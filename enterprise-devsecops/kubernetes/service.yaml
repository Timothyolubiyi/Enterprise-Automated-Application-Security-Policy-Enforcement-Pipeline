apiVersion: v1
kind: Service
metadata:
  name: enterprise-app-lb

spec:
  type: LoadBalancer

  selector:
    app: enterprise-app

  ports:
    - port: 80
      targetPort: 3000

      livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5

readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5